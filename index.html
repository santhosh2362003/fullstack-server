<script>
  async function fetchTodos() {
    const res = await fetch('http://<YOUR_EC2_PUBLIC_IP>:3000/todos');
    const data = await res.json();
    document.getElementById('list').innerHTML = data.map(t => `<li>${t.task}</li>`).join('');
  }
</script>
<body>
  <h1>My Todo List</h1>
  <ul id="list"></ul>
  <button onclick="fetchTodos()">Load Tasks</button>
</body>
